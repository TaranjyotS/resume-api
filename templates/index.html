<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Helper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Job Application Helper</h1>
    <form method="POST" enctype="multipart/form-data">
        <label for="job_description">Job Description:</label>
        <textarea id="job_description" name="job_description" rows="4" required></textarea><br><br>

        <label for="resume">Upload Your Resume (PDF, DOCX, TXT, RTF):</label>
        <input type="file" id="resume" name="resume" required><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
